<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Adjustment</title>

<style>
body{
  font-family: Arial;
  background:#71773d;
  margin:0;
}

/* header (1 line responsive like your other pages) */
.header{
  background:#000;
  color:#fff;
  padding:15px;
  font-weight:bold;
  text-align:center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: clamp(14px, 5vw, 24px);
  line-height: 1.2;
}

/* centered navbar, no logout */
.navbar{
  background:#333;
  padding:10px 12px;
  display:flex;
  justify-content:center;
}
.nav-links{
  display:flex;
  gap:10px;
  flex-wrap: nowrap;
  overflow-x:auto;
  overflow-y:hidden;
  white-space:nowrap;
  -webkit-overflow-scrolling: touch;
}
.nav-links::-webkit-scrollbar{ height:6px; }
.nav-links::-webkit-scrollbar-thumb{ background:#666; border-radius:10px; }

.navbar a{
  color:#fff;
  text-decoration:none;
  padding:10px;
  border-radius:5px;
  display:inline-block;
  flex:0 0 auto;
}
.navbar a:hover{ background:#555; }

.container{
  width:min(600px, 92vw);
  margin:20px auto;
  background:rgba(206,206,109,0.993);
  padding:20px;
  border-radius:10px;
}

label{
  display:block;
  margin-top:10px;
  font-weight:bold;
}

input, textarea{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin-top:6px;
  border:1px solid #666;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  margin-top:12px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
  border-radius:6px;
}
button:hover{ background:#0056b3; }

.small{
  margin-top:10px;
  font-size:13px;
  opacity:0.85;
}
</style>
</head>

<body>
  <div class="header">BREWSPOT CAFE</div>

  <div class="navbar">
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="timekey.html">Time Key</a>
      <a href="request.html">Request</a>
      <a href="payslip.html">Payslip</a>
      <a href="profile.html">Profile</a>
    </div>
  </div>

  <div class="container">
    <h2>Attendance Adjustment Request</h2>

    <label for="reqDate">Date</label>
    <input id="reqDate" type="date">

    <label for="reqArea">Area</label>
    <input id="reqArea" type="text" placeholder="(auto)" readonly>

    <label for="reqTimeIn">Time In</label>
    <input id="reqTimeIn" type="time">

    <label for="reqTimeOut">Time Out</label>
    <input id="reqTimeOut" type="time">

    <label for="reqReason">Reason</label>
    <textarea id="reqReason" rows="5" placeholder="Explain why you need an adjustment..."></textarea>

    <button id="submitBtn" type="button">SUBMIT REQUEST</button>

    <div class="small">
      Requests will be sent to Admin for approval.
    </div>
  </div>

<script type="module">
import { auth, database } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { ref, push, set, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const reqDate = document.getElementById("reqDate");
const reqArea = document.getElementById("reqArea");
const reqTimeIn = document.getElementById("reqTimeIn");
const reqTimeOut = document.getElementById("reqTimeOut");
const reqReason = document.getElementById("reqReason");
const submitBtn = document.getElementById("submitBtn");

let currentUser = null;

// Load area from user profile so staff cannot change it here
async function loadUserArea(uid){
  let area = localStorage.getItem("area") || "";

  try{
    const snap = await get(ref(database, "users/" + uid + "/area"));
    if (snap.exists()){
      area = snap.val() || area;
      localStorage.setItem("area", area || "");
    }
  }catch(e){
    console.warn("Could not load area:", e);
  }

  return area;
}

onAuthStateChanged(auth, async (user) => {
  if (!user){
    window.location.href = "index.html";
    return;
  }
  currentUser = user;

  const area = await loadUserArea(user.uid);
  reqArea.value = area || "";
});

submitBtn.addEventListener("click", async () => {
  if (!currentUser){
    alert("Please login again.");
    window.location.href = "index.html";
    return;
  }

  const date = reqDate.value;
  const timeIn = reqTimeIn.value;
  const timeOut = reqTimeOut.value;
  const reason = reqReason.value.trim();
  const area = reqArea.value.trim();

  if (!date || !timeIn || !timeOut || !reason){
    alert("Please fill in Date, Time In, Time Out, and Reason.");
    return;
  }

  // Basic validation: timeOut should be after timeIn (same-day only)
  if (timeOut <= timeIn){
    alert("Time Out must be later than Time In.");
    return;
  }

  try{
    const newRef = push(ref(database, "requests"));
    await set(newRef, {
      uid: currentUser.uid,
      email: currentUser.email || (localStorage.getItem("email") || ""),
      area: area,
      date: date,           // stored as YYYY-MM-DD
      newTimeIn: timeIn,    // HH:MM
      newTimeOut: timeOut,  // HH:MM
      reason: reason,
      status: "pending",
      createdAt: Date.now()
    });

    alert("Request sent! Please wait for admin approval.");

    // reset form
    reqDate.value = "";
    reqTimeIn.value = "";
    reqTimeOut.value = "";
    reqReason.value = "";

  }catch(e){
    console.error(e);
    alert("Failed to send request. Check your internet/database rules.");
  }
});
</script>

</body>
</html>
