<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <style>
    body{ font-family: Arial; background:#71773d; margin:0; }
    .header{
      background:#000; color:#fff; padding:15px; font-weight:bold; text-align:center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-size: clamp(14px, 5vw, 24px); line-height: 1.2;
    }
    .navbar{
      background:#333; padding:10px 12px; display:flex; align-items:center; gap:10px;
    }
    .nav-left{
      display:flex; align-items:center; gap:10px; flex:1; justify-content:center;
      flex-wrap: nowrap; overflow-x:auto; overflow-y:hidden; white-space:nowrap;
      -webkit-overflow-scrolling: touch;
    }
    .nav-left::-webkit-scrollbar{ height: 6px; }
    .nav-left::-webkit-scrollbar-thumb{ background:#666; border-radius:10px; }
    .navbar a{
      color:white; text-decoration:none; padding:10px; border-radius:5px;
      display:inline-block; flex: 0 0 auto;
    }
    .navbar a:hover{ background:#555; }
    .logout-btn{
      background:#c62828; color:#fff; border:none; padding:10px 14px; border-radius:6px;
      cursor:pointer; white-space:nowrap; flex: 0 0 auto;
    }
    .logout-btn:hover{ background:#b71c1c; }
    .container{
      width:95%; margin:20px auto; background:rgba(206, 206, 109, 0.993);
      padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    .section-title{ margin:0 0 12px 0; font-size:20px; font-weight:bold; }
    .cutoff{
      background:rgba(255,255,255,0.55); padding:12px; border-radius:10px; margin-bottom:15px;
      border:1px solid rgba(0,0,0,0.15);
    }
    .cutoff .label{ font-weight:bold; }
    .cards{
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap:12px;
    }
    @media (max-width: 820px){ .cards{ grid-template-columns: 1fr; } }
    .card{
      background:rgba(255,255,255,0.65);
      border:1px solid rgba(0,0,0,0.15);
      border-radius:10px; padding:14px;
    }
    .card h3{ margin:0 0 8px 0; font-size:18px; }
    .time{ font-size:28px; font-weight:bold; letter-spacing:1px; }
    .count{ font-size:34px; font-weight:bold; letter-spacing:1px; }
    .hint{ margin-top:6px; font-size:13px; opacity:0.85; }
    .below{ margin-top:14px; }
    .below .cards{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    @media (max-width: 820px){ .below .cards{ grid-template-columns: 1fr; } }
  </style>
</head>

<body>
  <div class="header">BREWSPOT CAFE</div>

  <div class="navbar">
    <div class="nav-left">
      <a href="dashboard.html">Dashboard</a>
      <a href="timekey.html">Time Key</a>
      <a href="request.html">Request</a>
      <a href="payslip.html">Payslip</a>
      <a href="profile.html">Profile</a>
    </div>

    <button class="logout-btn" id="logoutBtn" type="button">Logout</button>
  </div>

  <div class="container">
    <div class="section-title">Cutoff Date</div>

    <div class="cutoff">
      <span class="label">Start date</span>:
      <span id="startDate">--/--/----</span>
      -
      <span class="label">End date</span>:
      <span id="endDate">--/--/----</span>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Paid Time</h3>
        <div class="time" id="paidTime">00:00</div>
      </div>

      <div class="card">
        <h3>Tardiness</h3>
        <div class="time" id="tardinessTime">00:00</div>
      </div>

      <div class="card">
        <h3>Undertime</h3>
        <div class="time" id="undertimeTime">00:00</div>
      </div>
    </div>

    <div class="below">
      <div class="cards">
        <div class="card">
          <h3>Total Attendance</h3>
          <div class="count" id="totalAttendance">0</div>
        </div>

        <div class="card">
          <h3>Pending Request</h3>
          <div class="count" id="pendingRequest">0</div>
        </div>
      </div>
    </div>
  </div>

<script type="module">
import { auth, database } from "./firebase.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { ref, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

function mmddyyyyFromISO(iso){
  const d = new Date(iso + "T00:00:00");
  if (Number.isNaN(d.getTime())) return "--/--/----";
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const yyyy = d.getFullYear();
  return `${mm}/${dd}/${yyyy}`;
}

function minutesToHHMM(mins){
  const m = Math.max(0, parseInt(mins || "0", 10));
  const hh = String(Math.floor(m / 60)).padStart(2, "0");
  const mm = String(m % 60).padStart(2, "0");
  return `${hh}:${mm}`;
}

function minutesBetween(dateISO, timeIn, timeOut){
  const start = new Date(`${dateISO}T${timeIn}:00`);
  const end = new Date(`${dateISO}T${timeOut}:00`);
  const ms = end - start;
  if (Number.isNaN(ms) || ms <= 0) return 0;
  return Math.round(ms / (1000 * 60));
}

async function loadCutoff(){
  const snap = await get(ref(database, "settings/cutoff"));
  const data = snap.exists() ? (snap.val() || {}) : {};
  document.getElementById("startDate").textContent = mmddyyyyFromISO(data.start || "");
  document.getElementById("endDate").textContent = mmddyyyyFromISO(data.end || "");
  return data;
}

onAuthStateChanged(auth, async (user) => {
  if (!user){
    window.location.href = "index.html";
    return;
  }

  const cutoff = await loadCutoff();

  const recordSnap = await get(ref(database, `timeRecords/${user.uid}`));
  const records = recordSnap.exists() ? (recordSnap.val() || {}) : {};
  const rows = Object.entries(records)
    .map(([date, record]) => ({ date, ...(record || {}) }))
    .filter(r => {
      if (!cutoff.start || !cutoff.end) return true;
      return r.date >= cutoff.start && r.date <= cutoff.end;
    });

  const paidMinutes = rows.reduce((total, r) => {
    const explicit = Number(r.paidMinutes);
    if (!Number.isNaN(explicit) && explicit > 0) return total + explicit;
    return total + ((r.timeIn && r.timeOut) ? minutesBetween(r.date, r.timeIn, r.timeOut) : 0);
  }, 0);

  const tardinessMinutes = rows.reduce((total, r) => total + Number(r.tardinessMinutes || 0), 0);
  const undertimeMinutes = rows.reduce((total, r) => total + Number(r.undertimeMinutes || 0), 0);

  document.getElementById("paidTime").textContent = minutesToHHMM(paidMinutes);
  document.getElementById("tardinessTime").textContent = minutesToHHMM(tardinessMinutes);
  document.getElementById("undertimeTime").textContent = minutesToHHMM(undertimeMinutes);
  document.getElementById("totalAttendance").textContent = String(rows.length);

  const reqSnap = await get(ref(database, "requests"));
  const reqs = reqSnap.exists() ? (reqSnap.val() || {}) : {};
  const pending = Object.values(reqs).filter(r => r?.uid === user.uid && (r?.status || "pending") === "pending").length;
  document.getElementById("pendingRequest").textContent = String(pending);
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  try { await signOut(auth); } catch (e) { console.warn("signOut failed:", e); }
  localStorage.clear();
  window.location.href = "index.html";
});
</script>
</body>
</html>
